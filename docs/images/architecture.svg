<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="archBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="archAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06d6a0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#05a882;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="800" height="400" fill="url(#archBg)" rx="12"/>
  <text x="400" y="35" font-family="Segoe UI,Arial,sans-serif" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="bold">Architecture Overview</text>
  <rect x="2" y="45" width="796" height="3" fill="url(#archAccent)" opacity="0.5"/>

  <!-- Node 1 (top-left) -->
  <rect x="40" y="70" width="220" height="90" rx="10" fill="#161b22" stroke="#06d6a0" stroke-width="2" filter="url(#shadow)"/>
  <text x="150" y="100" font-family="Segoe UI,Arial,sans-serif" font-size="14" fill="#06d6a0" text-anchor="middle" font-weight="bold">Food Input</text>
  <text x="150" y="120" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Food name, nutrition label text, or meal</text>
  <text x="150" y="138" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#8b949e" text-anchor="middle"> description</text>

  <!-- Node 2 (top-right) -->
  <rect x="540" y="70" width="220" height="90" rx="10" fill="#161b22" stroke="#06d6a0" stroke-width="2" filter="url(#shadow)"/>
  <text x="650" y="100" font-family="Segoe UI,Arial,sans-serif" font-size="14" fill="#06d6a0" text-anchor="middle" font-weight="bold">LLM Analyzer</text>
  <text x="650" y="120" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">AI-powered nutritional analysis via loca</text>
  <text x="650" y="138" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">l Ollama</text>

  <!-- Arrow 1->3 -->
  <line x1="150" y1="160" x2="150" y2="195" stroke="#06d6a0" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Arrow 2->4 -->
  <line x1="650" y1="160" x2="650" y2="195" stroke="#06d6a0" stroke-width="2"/>

  <!-- Node 3 (mid-left) -->
  <rect x="40" y="195" width="220" height="90" rx="10" fill="#161b22" stroke="#06d6a0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="150" y="225" font-family="Segoe UI,Arial,sans-serif" font-size="14" fill="#06d6a0" text-anchor="middle" font-weight="bold">FDA Reference DB</text>
  <text x="150" y="245" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">13 nutrient daily reference values</text>
  <text x="150" y="263" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#8b949e" text-anchor="middle"></text>

  <!-- Node 4 (mid-right) -->
  <rect x="540" y="195" width="220" height="90" rx="10" fill="#161b22" stroke="#06d6a0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="650" y="225" font-family="Segoe UI,Arial,sans-serif" font-size="14" fill="#06d6a0" text-anchor="middle" font-weight="bold">Allergen Scanner</text>
  <text x="650" y="245" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">FDA Big 9 allergen detection engine</text>
  <text x="650" y="263" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#8b949e" text-anchor="middle"></text>

  <!-- Horizontal connector -->
  <line x1="260" y1="240" x2="540" y2="240" stroke="#06d6a0" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="400" y="235" font-family="Segoe UI,Arial,sans-serif" font-size="10" fill="#06d6a0" text-anchor="middle">data flow</text>

  <!-- Arrows down -->
  <line x1="150" y1="285" x2="150" y2="315" stroke="#06d6a0" stroke-width="2"/>
  <line x1="650" y1="285" x2="650" y2="315" stroke="#06d6a0" stroke-width="2"/>

  <!-- Node 5 (bottom-left) -->
  <rect x="40" y="315" width="220" height="70" rx="10" fill="#06d6a0" opacity="0.1" stroke="#06d6a0" stroke-width="1"/>
  <text x="150" y="345" font-family="Segoe UI,Arial,sans-serif" font-size="14" fill="#06d6a0" text-anchor="middle" font-weight="bold">Meal Tracker</text>
  <text x="150" y="365" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Daily meal log with nutrient totals and </text>

  <!-- Node 6 (bottom-right) -->
  <rect x="540" y="315" width="220" height="70" rx="10" fill="#06d6a0" opacity="0.1" stroke="#06d6a0" stroke-width="1"/>
  <text x="650" y="345" font-family="Segoe UI,Arial,sans-serif" font-size="14" fill="#06d6a0" text-anchor="middle" font-weight="bold">Rich Output</text>
  <text x="650" y="365" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">Formatted tables with %DV, allergen flag</text>

  <!-- Connecting arrows (vertical) -->
  <polygon points="147,193 150,185 153,193" fill="#06d6a0"/>
  <polygon points="647,193 650,185 653,193" fill="#06d6a0"/>
  <polygon points="147,313 150,305 153,313" fill="#06d6a0"/>
  <polygon points="647,313 650,305 653,313" fill="#06d6a0"/>
</svg>